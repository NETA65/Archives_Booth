<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA Area Archives — Interactive Kiosk</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /*
        ================================================================
        MAINTAINER CONFIG — Change these to customize the look & timing
        ================================================================
        */
        :root {
            --navy:         #1a2744;
            --blue:         #2c4a7c;
            --gold:         #c9a84c;
            --gold-light:   #e8d48b;
            --cream:        #faf6ee;
            --dark:         #0b1222;
            --darker:       #060d18;
            --slide-ms:     10000;   /* time per content slide */
            --trivia-ms:    14000;   /* time per trivia slide (question + answer) */
            --reveal-ms:    6000;    /* answer reveals after this many ms */
            --photo-ms:     8000;    /* time per photo slide */
            --fade-ms:      1200;    /* crossfade duration */
        }

        /* ============ RESET ============ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; width: 100%;
            overflow: hidden;
            background: var(--darker);
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        h1,h2,h3,h4,h5,h6 { font-family: 'Playfair Display', serif; }

        /* ============ KIOSK FRAME ============ */
        #kiosk {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }

        /* ============ SLIDE LAYER ============ */
        .slide {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            padding: 40px 60px;
            opacity: 0;
            transition: opacity calc(var(--fade-ms) * 1ms) ease;
            pointer-events: none;
            text-align: center;
        }
        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ============ BACKGROUND VARIATIONS ============ */
        .bg-0  { background: linear-gradient(135deg, #0b1222 0%, #1a2744 50%, #2c4a7c 100%); }
        .bg-1  { background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 60%, #2d4059 100%); }
        .bg-2  { background: linear-gradient(135deg, #10141f 0%, #2a1f0f 50%, #3d2c10 100%); }
        .bg-3  { background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #1e3a5f 100%); }
        .bg-4  { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #25254a 100%); }
        .bg-5  { background: linear-gradient(135deg, #1a0f0f 0%, #2e1a1a 50%, #3a2020 100%); }
        .bg-6  { background: linear-gradient(135deg, #0d1f0d 0%, #1a2e1a 50%, #1e3a2a 100%); }
        .bg-7  { background: linear-gradient(160deg, #18122B 0%, #271f3e 50%, #443366 100%); }

        /* ============ PARTICLES ============ */
        .particles {
            position: absolute; inset: 0;
            pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { opacity: 0; transform: translateY(100vh) scale(0); }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
        }

        /* ============ CORNER DECORATIONS ============ */
        .corner-deco {
            position: absolute;
            width: 80px; height: 80px;
            border-color: var(--gold);
            border-style: solid;
            border-width: 0;
            opacity: 0.25;
        }
        .corner-tl { top: 20px; left: 20px; border-top-width: 3px; border-left-width: 3px; }
        .corner-tr { top: 20px; right: 20px; border-top-width: 3px; border-right-width: 3px; }
        .corner-bl { bottom: 20px; left: 20px; border-bottom-width: 3px; border-left-width: 3px; }
        .corner-br { bottom: 20px; right: 20px; border-bottom-width: 3px; border-right-width: 3px; }

        /* ============ PROGRESS RING (bottom center) ============ */
        #timerRing {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 50px; height: 50px;
        }
        #timerRing svg {
            transform: rotate(-90deg);
        }
        #timerRing circle {
            fill: none;
            stroke-width: 3;
        }
        .ring-bg   { stroke: rgba(201,168,76,0.15); }
        .ring-fill { stroke: var(--gold); stroke-dasharray: 138.23; stroke-dashoffset: 0; transition: stroke-dashoffset 0.3s linear; }

        /* ============ SLIDE TYPE BADGE ============ */
        .slide-badge {
            position: absolute;
            top: 22px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold);
            padding: 8px 30px;
            border-radius: 30px;
            font-size: clamp(0.8rem, 1.8vmin, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            backdrop-filter: blur(5px);
        }

        /* ============ FULLSCREEN BUTTON ============ */
        #fsBtn {
            position: fixed;
            bottom: 20px; right: 20px;
            z-index: 200;
            width: clamp(44px, 6vmin, 64px);
            height: clamp(44px, 6vmin, 64px);
            border-radius: 50%;
            border: 2px solid rgba(201,168,76,0.4);
            background: rgba(15,18,34,0.7);
            color: var(--gold);
            font-size: clamp(1.2rem, 2.5vmin, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        #fsBtn:hover {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
            transform: scale(1.1);
        }

        /* ============================================================
           GIANT TEXT — uses vmin so text scales with BOTH dimensions.
           On a 1920x1080 display, 1vmin = 10.8px.
           On a 1080x1920 portrait, 1vmin = 10.8px too.
           This ensures readability regardless of screen orientation.
           ============================================================ */
        .mega-title {
            font-size: clamp(3rem, 9vmin, 8rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 0.3em;
        }
        .mega-title .gold { color: var(--gold); }

        .big-heading {
            font-size: clamp(2.5rem, 7vmin, 5.5rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 0.3em;
        }

        .big-body {
            font-size: clamp(1.6rem, 3.8vmin, 2.8rem);
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .big-quote {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: clamp(1.8rem, 5vmin, 3.5rem);
            color: var(--gold-light);
            line-height: 1.4;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        .quote-attr {
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-size: clamp(1rem, 2.5vmin, 1.6rem);
            color: var(--gold);
            margin-top: 0.8em;
            font-weight: 600;
        }

        .gold-rule {
            width: 120px; height: 5px;
            background: var(--gold);
            margin: 0.6em auto;
            border-radius: 3px;
        }

        /* ============ TRIVIA SLIDE ============ */
        .trivia-category {
            display: inline-block;
            background: rgba(201,168,76,0.2);
            color: var(--gold);
            padding: 10px 32px;
            border-radius: 30px;
            font-size: clamp(0.9rem, 2vmin, 1.3rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 0.8em;
        }
        .trivia-difficulty {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 6px;
            font-size: clamp(0.7rem, 1.5vmin, 1rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-left: 12px;
            vertical-align: middle;
        }
        .diff-easy   { background: rgba(40,167,69,0.25); color: #6fdc8c; }
        .diff-medium { background: rgba(255,193,7,0.25); color: #ffe066; }
        .diff-hard   { background: rgba(220,53,69,0.25); color: #ff8a8a; }

        .trivia-q {
            font-size: clamp(2rem, 5.5vmin, 4.2rem);
            font-weight: 700;
            line-height: 1.25;
            max-width: 1050px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 0.6em;
        }

        .trivia-answer-box {
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(201,168,76,0.2);
            border-radius: 16px;
            padding: 1.2em 2em;
            max-width: 950px;
            margin: 0 auto;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.6s ease;
        }
        .trivia-answer-box.revealed {
            border-color: var(--gold);
            background: rgba(201,168,76,0.08);
        }
        .trivia-answer-box .answer-icon {
            font-size: clamp(1.8rem, 3.5vmin, 2.8rem);
            color: var(--gold);
            margin-right: 0.5em;
            opacity: 0;
            transition: opacity 0.5s;
            flex-shrink: 0;
        }
        .trivia-answer-box.revealed .answer-icon { opacity: 1; }

        .trivia-a {
            font-size: clamp(1.5rem, 3.8vmin, 2.8rem);
            color: var(--gold-light);
            font-weight: 600;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .trivia-answer-box.revealed .trivia-a {
            opacity: 1;
            transform: translateY(0);
        }

        .trivia-timer-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 1em auto 0;
            overflow: hidden;
        }
        .trivia-timer-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s linear;
        }
        .trivia-hint {
            font-size: clamp(0.7rem, 1.5vmin, 1rem);
            color: rgba(255,255,255,0.3);
            margin-top: 0.5em;
        }

        /* ============ PHOTO SLIDE ============ */
        .photo-frame {
            position: relative;
            max-width: 70vw;
            max-height: 58vh;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid var(--gold);
            box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 60px rgba(201,168,76,0.1);
            margin-bottom: 0.8em;
        }
        .photo-frame img {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 53vh;
            object-fit: contain;
            background: #111;
        }
        .photo-caption {
            font-size: clamp(1.5rem, 3.5vmin, 2.6rem);
            color: #fff;
            font-weight: 600;
            margin-top: 0.3em;
        }
        .photo-credit {
            font-size: clamp(0.8rem, 1.5vmin, 1.1rem);
            color: rgba(255,255,255,0.4);
            margin-top: 0.2em;
        }

        /* ============ STAT / FACT CARDS ============ */
        .fact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5em;
            max-width: 1200px;
            width: 100%;
        }
        .fact-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 16px;
            padding: 1.8em 1.3em;
            text-align: center;
            transition: transform 0.4s, border-color 0.4s;
        }
        .fact-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }
        .fact-card i {
            font-size: clamp(2.2rem, 5vmin, 3.8rem);
            color: var(--gold);
            margin-bottom: 0.3em;
        }
        .fact-card h3 {
            font-size: clamp(1.4rem, 3vmin, 2.2rem);
            margin-bottom: 0.3em;
        }
        .fact-card p {
            font-size: clamp(1.1rem, 2.5vmin, 1.6rem);
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        .stat-big {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 10vmin, 8rem);
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
        }
        .stat-label {
            font-size: clamp(1.2rem, 2.8vmin, 2rem);
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0.3em;
        }

        /* ============ TIMELINE (single-slide friendly) ============ */
        .timeline-entries {
            text-align: left;
            max-width: 1000px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }
        .tl-entry {
            display: flex;
            gap: 1em;
            align-items: flex-start;
            padding: 0.6em 0;
            border-bottom: 1px solid rgba(201,168,76,0.12);
        }
        .tl-year {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.3rem, 3vmin, 2rem);
            font-weight: 700;
            color: var(--gold);
            min-width: 130px;
            flex-shrink: 0;
        }
        .tl-text {
            font-size: clamp(1.2rem, 2.8vmin, 1.8rem);
            color: rgba(255,255,255,0.85);
            line-height: 1.4;
        }

        /* ============ STEPS / TRADITIONS LARGE ============ */
        .step-big-num {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 18vmin, 14rem);
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
            opacity: 0.12;
            position: absolute;
            top: 50%;
            left: 5%;
            transform: translateY(-50%);
        }
        .step-text-big {
            font-size: clamp(1.8rem, 4.5vmin, 3.2rem);
            line-height: 1.4;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
            position: relative;
            z-index: 2;
        }
        .step-label {
            font-size: clamp(1rem, 2.2vmin, 1.5rem);
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 0.6em;
        }

        /* ============ ENTRANCE ANIMATIONS ============ */
        .anim-enter {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .slide.active .anim-enter {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.5s; /* wait for parent fade to become visible */
        }
        .slide.active .anim-enter:nth-child(2) { transition-delay: 0.65s; }
        .slide.active .anim-enter:nth-child(3) { transition-delay: 0.8s; }
        .slide.active .anim-enter:nth-child(4) { transition-delay: 0.95s; }
        .slide.active .anim-enter:nth-child(5) { transition-delay: 1.1s; }

        /* ============ FOOTER STRIP ============ */
        .kiosk-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.4;
            z-index: 50;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .slide { padding: 30px 24px; }
            .photo-frame { max-width: 90vw; }
            .fact-grid { grid-template-columns: 1fr; }
            .step-big-num { font-size: 5rem; left: 2%; }
            .tl-entry { flex-direction: column; gap: 0.2em; }
            .tl-year { min-width: auto; }
        }

        @media print {
            .slide { position: relative !important; opacity: 1 !important; page-break-after: always; }
            #timerRing, .particles, .kiosk-footer { display: none !important; }
        }
    </style>
</head>

        </svg>
    </div>

    <button type="button" id="fsBtn" title="Toggle Fullscreen" aria-label="Toggle Fullscreen">
        <i class="bi bi-arrows-fullscreen" id="fsIcon"></i>
    </button>

    <!-- Bottom gold accent -->
    <div class="kiosk-footer"></div>

    <!-- Kiosk container — slides injected here by JS -->
    <div id="kiosk"></div>

    /* =================================================================
       CSV LOADER
       ================================================================= */
    async function loadTrivia() {
        try {
            const resp = await fetch('qa_library.csv');
            const text = await resp.text();
            triviaData = parseCSV(text);
        } catch (e) {
            console.warn('Could not load qa_library.csv:', e);
        }
    }

    function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = csvLine(lines[0]);
        return lines.slice(1).map(line => {
            const vals = csvLine(line);
            const obj = {};
            headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
            return obj;
        }).filter(o => o.question);
    }

    function csvLine(line) {
        const r = []; let cur = '', q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { if (q && line[i+1] === '"') { cur += '"'; i++; } else q = !q; }
            else if (c === ',' && !q) { r.push(cur); cur = ''; }
            else cur += c;
        }
        r.push(cur);
        return r;
    }


    /* =================================================================
       BUILD THE RANDOMIZED POOL
       ================================================================= */
    function buildPool() {
        slidePool = [];

        // Add content slides
        CONTENT_SLIDES.forEach(s => slidePool.push({ kind: 'content', data: s }));

        // Add photo slides (each photo = one slide)
        PHOTO_MANIFEST.forEach(p => slidePool.push({ kind: 'photo', data: p }));

        // Add trivia slides (all questions as individual slides)
        triviaData.forEach(q => slidePool.push({ kind: 'trivia', data: q }));

        // Shuffle everything
        shuffle(slidePool);
        poolIndex = 0;
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }


    /* =================================================================
       SHOW NEXT SLIDE
       ================================================================= */
    function showNext() {
        // Re-shuffle if we've gone through everything
        if (poolIndex >= slidePool.length) {
            shuffle(slidePool);
            poolIndex = 0;
        }

        const item = slidePool[poolIndex++];
        const el   = buildSlideElement(item);
        const kiosk = document.getElementById('kiosk');

        // Add new slide (hidden)
        kiosk.appendChild(el);

        // Crossfade
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                if (currentSlideEl) currentSlideEl.classList.remove('active');
                el.classList.add('active');

                // Remove old slide after fade
                const old = currentSlideEl;
                if (old) {
                    setTimeout(() => old.remove(), FADE_MS + 100);
                }
                currentSlideEl = el;
            });
        });

        // Determine timing
        let duration = SLIDE_MS;
        if (item.kind === 'trivia') duration = TRIVIA_MS;
        if (item.kind === 'photo')  duration = PHOTO_MS;

        // Clear any orphan trivia timers from previous slide
        clearTimeout(triviaRevealTimer);
        clearInterval(triviaBarInterval);
        triviaRevealTimer = null;
        triviaBarInterval = null;

        // Auto-reveal for trivia
        if (item.kind === 'trivia') {
            triviaRevealTimer = setTimeout(() => {
                const box = el.querySelector('.trivia-answer-box');
                if (box) box.classList.add('revealed');
            }, REVEAL_MS);
        }

        // Timer ring animation
        startRing(duration);

        // Schedule next
        clearTimeout(currentTimer);
        currentTimer = setTimeout(showNext, duration);
    }


    /* =================================================================
       TIMER RING
       ================================================================= */
    function startRing(duration) {
        const ring = document.getElementById('ringFill');
        const circumference = 2 * Math.PI * 22; // r=22
        let elapsed = 0;
        const step = 100;

        ring.style.strokeDashoffset = '0';

        clearInterval(ringInterval);
        ringInterval = setInterval(() => {
            elapsed += step;
            const pct = Math.min(elapsed / duration, 1);
            ring.style.strokeDashoffset = (circumference * pct).toFixed(2);
            if (pct >= 1) clearInterval(ringInterval);
        }, step);
    }


    /* =================================================================
       SLIDE BUILDERS
       ================================================================= */
    function buildSlideElement(item) {
        const div = document.createElement('div');
        const bgClass = `bg-${Math.floor(Math.random() * BG_COUNT)}`;
        div.className = `slide ${bgClass}`;

        // Corner decorations
        div.innerHTML = `
            <div class="corner-deco corner-tl"></div>
            <div class="corner-deco corner-tr"></div>
            <div class="corner-deco corner-bl"></div>
            <div class="corner-deco corner-br"></div>
            <div class="particles"></div>
        `;

        // Add particles
        const pContainer = div.querySelector('.particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 14) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            const size = 2 + Math.random() * 4;
            p.style.width = p.style.height = size + 'px';
            pContainer.appendChild(p);
        }

        // Add badge directly to slide (not inside inner/anim-enter)
        // so it always positions at screen top via slide's position context
        let badgeText = '';
        if (item.kind === 'content' && item.data.badge) badgeText = item.data.badge;
        else if (item.kind === 'photo')  badgeText = 'Historical Photo';
        else if (item.kind === 'trivia') badgeText = 'Trivia';
        if (badgeText) {
            const badge = document.createElement('div');
            badge.className = 'slide-badge';
            badge.textContent = badgeText;
            div.appendChild(badge);
        }

        // Build inner content based on kind
        switch (item.kind) {
            case 'content': buildContentSlide(div, item.data, !!badgeText); break;
            case 'photo':   buildPhotoSlide(div, item.data);   break;
            case 'trivia':  buildTriviaSlide(div, item.data);  break;
        }

        return div;
    }


    /* ----- CONTENT SLIDE ----- */
    function buildContentSlide(el, data, hasBadge) {
        const inner = document.createElement('div');
        inner.style.cssText = 'position:relative;z-index:2;max-width:1100px;width:100%;';
        if (hasBadge) inner.style.paddingTop = '30px';

        switch (data.type) {
            case 'hero':
                inner.innerHTML += `
                    <div class="anim-enter"><h1 class="mega-title">${data.title}</h1></div>
                    <div class="anim-enter"><div class="gold-rule"></div></div>
                    <div class="anim-enter"><p class="big-body" style="margin:0 auto;">${data.subtitle}</p></div>
                    ${data.footnote ? `<div class="anim-enter"><p style="color:var(--gold);font-size:clamp(1.1rem,2.5vmin,1.6rem);margin-top:0.8em;font-weight:600;">${data.footnote}</p></div>` : ''}
                `;
                break;

            case 'quote':
                inner.innerHTML += `
                    <div class="anim-enter"><div class="gold-rule"></div></div>
                    <div class="anim-enter"><p class="big-quote">"${data.text}"</p></div>
                    <div class="anim-enter"><p class="quote-attr">${data.attr}</p></div>
                `;
                break;

            case 'story':
                inner.innerHTML += `
                    <div class="anim-enter"><h2 class="big-heading">${data.heading}</h2></div>
                    <div class="anim-enter"><div class="gold-rule"></div></div>
                    <div class="anim-enter"><p class="big-body" style="margin:0 auto;">${data.body}</p></div>
                `;
                break;

            case 'stats':
                inner.innerHTML += `<div class="anim-enter"><h2 class="big-heading">${data.heading}</h2><div class="gold-rule"></div></div>`;
                let statsHtml = '<div class="anim-enter" style="display:flex;flex-wrap:wrap;justify-content:center;gap:2em;margin-top:1em;">';
                data.items.forEach(s => {
                    statsHtml += `<div style="text-align:center;min-width:180px;"><div class="stat-big">${s.value}</div><div class="stat-label">${s.label}</div></div>`;
                });
                statsHtml += '</div>';
                inner.innerHTML += statsHtml;
                break;

            case 'facts':
                inner.innerHTML += `<div class="anim-enter"><h2 class="big-heading">${data.heading}</h2><div class="gold-rule"></div></div>`;
                let factsHtml = '<div class="anim-enter"><div class="fact-grid">';
                data.items.forEach(f => {
                    factsHtml += `<div class="fact-card"><i class="bi ${f.icon}"></i><h3>${f.title}</h3><p>${f.text}</p></div>`;
                });
                factsHtml += '</div></div>';
                inner.innerHTML += factsHtml;
                break;

            case 'timeline':
                inner.innerHTML += `<div class="anim-enter"><h2 class="big-heading">${data.heading}</h2><div class="gold-rule"></div></div>`;
                let tlHtml = '<div class="anim-enter"><div class="timeline-entries">';
                data.items.forEach(t => {
                    tlHtml += `<div class="tl-entry"><span class="tl-year">${t.year}</span><span class="tl-text">${t.text}</span></div>`;
                });
                tlHtml += '</div></div>';
                inner.innerHTML += tlHtml;
                break;

            case 'step':
                inner.innerHTML += `
                    <div class="step-big-num">${data.num}</div>
                    <div class="anim-enter"><div class="step-label">${data.label}</div></div>
                    <div class="anim-enter"><p class="step-text-big">${data.text}</p></div>
                `;
                break;

            case 'list':
                inner.innerHTML += `<div class="anim-enter"><h2 class="big-heading">${data.heading}</h2><div class="gold-rule"></div></div>`;
                let listHtml = '<div class="anim-enter"><ul style="list-style:none;text-align:left;max-width:800px;margin:1em auto 0;">';
                data.items.forEach(li => {
                    listHtml += `<li style="padding:0.5em 0;font-size:clamp(1.3rem,2.8vmin,1.8rem);color:rgba(255,255,255,0.85);border-bottom:1px solid rgba(201,168,76,0.12);"><i class="bi bi-check-circle-fill" style="color:var(--gold);margin-right:0.6em;"></i>${li}</li>`;
                });
                listHtml += '</ul></div>';
                inner.innerHTML += listHtml;
                break;
        }

        el.appendChild(inner);
    }


    /* ----- PHOTO SLIDE ----- */
    function buildPhotoSlide(el, data) {
        const inner = document.createElement('div');
        inner.style.cssText = 'position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding-top:30px;';

        inner.innerHTML = `
            <div class="anim-enter">
                <div class="photo-frame">
                    <img src="${data.file}" alt="${data.caption}" onerror="this.parentElement.innerHTML='<div style=&quot;padding:4em;color:var(--gold)&quot;>Photo not found</div>'">
                </div>
            </div>
            <div class="anim-enter">
                <div class="photo-caption">${data.caption}</div>
                <div class="photo-credit">${data.credit}</div>
            </div>
        `;

        el.appendChild(inner);
    }


    /* ----- TRIVIA SLIDE ----- */
    function buildTriviaSlide(el, data) {
        const diffClass = `diff-${data.difficulty || 'medium'}`;
        const inner = document.createElement('div');
        inner.style.cssText = 'position:relative;z-index:2;max-width:1000px;width:100%;padding-top:30px;';

        inner.innerHTML = `
            <div class="anim-enter">
                <span class="trivia-category">${data.category || 'General'}</span>
                <span class="trivia-difficulty ${diffClass}">${data.difficulty || 'medium'}</span>
            </div>
            <div class="anim-enter">
                <h2 class="trivia-q">${data.question}</h2>
            </div>
            <div class="anim-enter">
                <div class="trivia-answer-box">
                    <i class="bi bi-lightbulb-fill answer-icon"></i>
                    <div class="trivia-a">${data.answer}</div>
                </div>
            </div>
            <div class="anim-enter">
                <div class="trivia-timer-bar"><div class="trivia-timer-fill"></div></div>
                <p class="trivia-hint">Answer reveals automatically</p>
            </div>
        `;

        el.appendChild(inner);

        // Animate the trivia timer bar (tracked so it can be cleared on manual advance)
        requestAnimationFrame(() => {
            const fill = el.querySelector('.trivia-timer-fill');
            if (fill) {
                let elapsed = 0;
                const step = 100;
                triviaBarInterval = setInterval(() => {
                    elapsed += step;
                    fill.style.width = Math.min((elapsed / REVEAL_MS) * 100, 100) + '%';
                    if (elapsed >= REVEAL_MS) { clearInterval(triviaBarInterval); triviaBarInterval = null; }
                }, step);
            }
        });
    }


    /* =================================================================
       FULLSCREEN BUTTON
       ================================================================= */
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    }

    // Wire up the button (stopPropagation so it doesn't also advance the slide)
    document.getElementById('fsBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullscreen();
    });

    // Update icon when fullscreen state changes
    document.addEventListener('fullscreenchange', () => {
        const icon = document.getElementById('fsIcon');
        if (document.fullscreenElement) {
            icon.className = 'bi bi-fullscreen-exit';
        } else {
            icon.className = 'bi bi-arrows-fullscreen';
        }
    });


    /* =================================================================
       KEYBOARD SHORTCUTS (for manual control at the booth)
       ================================================================= */
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        switch (e.key) {
            case 'ArrowRight':
            case ' ':
            case 'PageDown':
                e.preventDefault();
                clearTimeout(currentTimer);
                showNext();
                break;
            case 'ArrowLeft':
            case 'PageUp':
                e.preventDefault();
                // Go back: decrement poolIndex by 2 (current was already incremented)
                poolIndex = Math.max(0, poolIndex - 2);
                clearTimeout(currentTimer);
                showNext();
                break;
            case 'f':
            case 'F':
                toggleFullscreen();
                break;
            case 'Escape':
                // Let browser handle fullscreen exit
                break;
        }
    });

    // Tap/click anywhere to advance (except on the fullscreen button)
    document.addEventListener('click', (e) => {
        if (e.target.closest('#fsBtn')) return;
        clearTimeout(currentTimer);
        showNext();
    });

    </script>

    <!--
    ============================================================
    MAINTAINER NOTES
    ============================================================

    This is a FULLY AUTOMATIC, RANDOMIZED kiosk presentation
    for the AA Area Archives Committee booth at AA events.

    IT RUNS ITSELF — just open the file in a browser and go fullscreen (F key).
    Every slide (content, photos, trivia) appears in random order and loops forever.
    Trivia answers auto-reveal after 6 seconds.

    HOW TO ADD PHOTOS:
      1. Drop image file into "photos/" folder
      2. Add entry to PHOTO_MANIFEST array in this file
      3. It will appear as a random slide automatically

    HOW TO ADD QUIZ QUESTIONS:
      1. Open qa_library.csv in any spreadsheet app
      2. Add a row: id, category, question, answer, difficulty, source
      3. Save as CSV — questions appear as random slides

    HOW TO ADD CONTENT SLIDES:
      1. Find the CONTENT_SLIDES array in this file
      2. Add a new object following the type patterns:
         - "hero"     → title + subtitle
         - "quote"    → quote text + attribution
         - "story"    → heading + body paragraph
         - "stats"    → array of value/label pairs
         - "facts"    → array of icon/title/text cards
         - "timeline" → array of year/text entries
         - "step"     → big number + step/tradition text

    TIMING (edit at top of <script>):
      SLIDE_MS   = 10000  (regular slides, 10s)
      TRIVIA_MS  = 14000  (trivia slides, 14s)
      REVEAL_MS  = 6000   (answer reveals after 6s)
      PHOTO_MS   = 8000   (photo slides, 8s)

    CONTROLS:
      Right Arrow / Space / Click — Skip to next slide
      F — Toggle fullscreen
      Everything else is fully automatic.

    DEPENDENCIES (CDN):
      - Bootstrap 5.3.3 + Icons
      - Animate.css 4.1.1
      - Google Fonts (Playfair Display, Inter, Crimson Text)
    ============================================================
    -->
